<label class="flex items-center space-x-2 cursor-pointer">
    <input
      type="radio"
      [name]="name"
      [value]="value"
      [checked]="checked"
      [disabled]="disabled"
      (change)="handleChange()"
      (click)="handleClick()"
      class="hidden peer"
    />
    <div
      class="w-6 h-6 rounded-full border-2 border-gray-400 flex items-center justify-center 
             peer-checked:border-blue-900 peer-checked:border-4 
             hover:border-blue-900 focus:ring-2 focus:ring-blue-300 transition-all"
    >
      <div
        class="w-3.5 h-3.5 bg-blue-900 rounded-full"
        [ngClass]="{'hidden': !checked}"
      ></div>
    </div>
    <ng-content></ng-content>
  </label>
